name: Mehad Autonomous AI Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      ai_model:
        description: "Ollama model (e.g. qwen2.5-coder:7b)"
        required: false
        default: "qwen2.5-coder:7b"
      base_url:
        description: "Target URL to test"
        required: false
        default: "https://dev.mehadedu.com/en"
      browser_use:
        description: "Enable browser-use agent? (true/false)"
        required: false
        default: "false"
      enable_vision:
        description: "Enable vision-LLM UI review (QA-22)? (true/false) — pulls 5GB model"
        required: false
        default: "false"

# Opt into Node.js 24 to suppress Node.js 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Keep report publishing deterministic: runs on the same branch should queue
# instead of racing each other to update gh-pages.
concurrency:
  group: mehad-autonomous-ai-testing-${{ github.ref }}
  cancel-in-progress: false

# Grant write access to contents so the gh-pages deploy can push.
# Default GITHUB_TOKEN only has Contents:read which causes
#   "remote: Permission to ... denied to github-actions[bot]" → git exit 128.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  autonomous-ai-test:
    name: AI Test Agent v5
    runs-on: ubuntu-latest
    timeout-minutes: 70   # AI job must not block report deploy forever
    needs: qa-agent-data-flow
    if: always()

    # WAHA provides a WhatsApp OTP reader for production tests.
    # Session needs one-time QR scan at http://localhost:3000/dashboard.
    # CI staging tests use the fixed OTP (123456) and don't need authentication.
    services:
      waha:
        image: devlikeapro/waha
        ports:
          - 3000:3000

    env:
      BASE_URL:              ${{ github.event.inputs.base_url  || 'https://dev.mehadedu.com/en' }}
      AI_MODEL:              ${{ github.event.inputs.ai_model  || 'qwen2.5-coder:7b' }}
      AI_TIMEOUT:            "120"      # seconds per ollama.chat() call before giving up (7b needs more time)
      MAX_FIX_RETRIES:       "1"        # self-heal rounds in CI (reduce from 3 to save time)
      BROWSER_USE_ENABLED:   "false"
      BROWSER_USE_MODEL:     "qwen2.5-coder:7b"
      BROWSER_USE_TIMEOUT:   "30"
      OPENAI_API_KEY:        "ollama"
      OPENAI_BASE_URL:       "http://localhost:11434/v1"
      # ── Staging OTP (fixed) ──────────────────────────────────────────────
      TEST_OTP:              ${{ secrets.TEST_OTP        || '123456' }}
      TEST_PHONE:            ${{ secrets.TEST_PHONE      || '98976564' }}
      TEST_COUNTRY:          ${{ secrets.TEST_COUNTRY    || '+880' }}
      TEACHER_PHONE:         ${{ secrets.TEACHER_PHONE   || '98976564' }}
      TEACHER_OTP:           ${{ secrets.TEACHER_OTP     || '123456' }}
      STUDENT_PHONE:         ${{ secrets.STUDENT_PHONE   || '98765432' }}
      STUDENT_OTP:           ${{ secrets.STUDENT_OTP     || '123456' }}
      # ── Production OTP (Twilio) — only active when BASE_URL=mehadedu.com ─
      PROD_OTP_BACKEND:      ${{ secrets.PROD_OTP_BACKEND }}
      PROD_TEST_PHONE:       ${{ secrets.PROD_TEST_PHONE }}
      PROD_STUDENT_PHONE:    ${{ secrets.PROD_STUDENT_PHONE }}
      PROD_TEACHER_PHONE:    ${{ secrets.PROD_TEACHER_PHONE }}
      PROD_COUNTRY_CODE:     ${{ secrets.PROD_COUNTRY_CODE || '+966' }}
      TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER || '+14155238886' }}
      # ── WAHA (WhatsApp HTTP API) — Docker service above exposes :3000 ────────
      WAHA_URL:              http://localhost:3000
      WAHA_SESSION:          ${{ secrets.WAHA_SESSION  || 'default' }}
      WAHA_CHAT_ID:          ${{ secrets.WAHA_CHAT_ID  || '' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 1b. Wait for WAHA service ────────────────────────────────────────────
      - name: Wait for WAHA (WhatsApp OTP service)
        run: |
          echo "Waiting for WAHA to start (max 30s)..."
          for i in $(seq 1 15); do
            if curl -s http://localhost:3000/api/version > /dev/null 2>&1; then
              echo "✅ WAHA ready"
              curl -s http://localhost:3000/api/version | python3 -m json.tool 2>/dev/null | head -5 || true
              curl -s http://localhost:3000/api/sessions 2>/dev/null | head -c 300 || true
              echo ""
              break
            fi
            sleep 2
          done
          echo "ℹ️  WAHA status: $(curl -s http://localhost:3000/api/sessions 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d[0].get(\"status\",\"unknown\") if d else \"no sessions\")' 2>/dev/null || echo 'not reachable — staging OTP will be used')"

      # ── 2. Python 3.12 ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Python dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt || true
          # Install core deps directly in case requirements.txt has new entries
          pip install ollama playwright pytest pytest-playwright pytest-json-report \
                      pytest-html pytest-timeout Jinja2
          # Install langchain backends
          pip install langchain-openai langchain-ollama
          # Install browser-use (optional — skip if install fails)
          pip install browser-use langchain-openai langchain-ollama || echo "⚠️ browser-use install skipped"

      # ── 4. Playwright + Chromium ──────────────────────────────────────────
      - name: Install Playwright and Chromium
        run: playwright install chromium --with-deps

      # ── 5. Ollama ─────────────────────────────────────────────────────────
      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh

      # ── 6. Cache Ollama models ────────────────────────────────────────────
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-v6-qwen2.5-coder-7b-1.5b-tinyllama

      # ── 7. Start Ollama service ────────────────────────────────────────────
      - name: Start Ollama service
        run: |
          ollama serve &
          echo "Waiting for Ollama..."
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && echo "✅ Ollama ready" && break
            sleep 2
          done

      # ── 8. Pull AI models (7b primary + fallback chain) ──────────────────
      # Primary: qwen2.5-coder:7b (4.7 GB — best quality).
      # The 15-model chain in agent.py handles any subset that is available.
      - name: Pull AI models
        timeout-minutes: 20
        run: |
          echo "=== Primary: qwen2.5-coder:7b (4.7 GB — best quality) ==="
          timeout 900 ollama pull qwen2.5-coder:7b || echo "⚠️  qwen2.5-coder:7b unavailable — falling back"

          echo ""
          echo "=== Fallback: qwen2.5-coder:1.5b (986 MB) ==="
          timeout 300 ollama pull qwen2.5-coder:1.5b || echo "⚠️ qwen2.5-coder:1.5b unavailable"

          echo ""
          echo "=== Fallback: tinyllama:1.1b (637 MB) ==="
          timeout 180 ollama pull tinyllama:1.1b || echo "⚠️ tinyllama unavailable"

          echo ""
          echo "=== Fallback: qwen2.5:0.5b (395 MB) ==="
          timeout 120 ollama pull qwen2.5:0.5b || echo "⚠️ qwen2.5:0.5b unavailable"

          echo ""
          echo "=== Available models ==="
          ollama list

      # ── 9. Verify all modules ─────────────────────────────────────────────
      - name: Verify setup
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python --version
          echo ""
          echo "=== Core packages ==="
          python -c "import ollama;     print('✅ ollama')"
          python -c "import playwright; print('✅ playwright')"
          python -c "import pytest;     print('✅ pytest')"
          echo ""
          echo "=== AI Engine modules ==="
          python -c "from ai_engine.spec_parser    import parse;                  print('✅ spec_parser')"
          python -c "from ai_engine.spec_compiler  import compile_spec;           print('✅ spec_compiler')"
          python -c "from ai_engine.test_generator import generate_all;           print('✅ test_generator')"
          python -c "from ai_engine.test_validator import validate_code;          print('✅ test_validator')"
          python -c "from ai_engine.evidence       import enrich_bug;             print('✅ evidence')"
          python -c "from ai_engine.bug_builder    import build_from_json_report; print('✅ bug_builder')"
          python -c "from ai_engine.gap_checker    import detect_gaps;            print('✅ gap_checker')"
          python -c "from ai_engine.memory         import load;                   print('✅ memory')"
          python -c "from ai_engine.reporter       import generate_report;        print('✅ reporter')"
          python -c "from ai_engine.agent          import AutonomousTestAgent;    print('✅ agent')"
          python -c "from ai_engine.browser_agent  import discover_page;          print('✅ browser_agent')" || echo "⚠️ browser_agent (optional)"
          python -c "from payloads import XSS, SQLI, BOUNDARY; print(f'✅ payloads  XSS:{len(XSS)} SQLi:{len(SQLI)} Boundary:{len(BOUNDARY)}')"
          echo ""
          echo "=== browser-use status ==="
          python -c "import browser_use; print('✅ browser-use installed')" || echo "⚠️ browser-use not installed (optional)"
          python -c "import langchain_ollama; print('✅ langchain-ollama installed')" || echo "⚠️ langchain-ollama not installed (optional)"
          echo ""
          echo "✅ All critical modules verified"

      # ── 10. Prepare directories ───────────────────────────────────────────
      - name: Prepare directories
        run: mkdir -p tests reports reports/screenshots reports/evidence

      # ── 11. Compile specs to JSON ─────────────────────────────────────────
      - name: Compile Specs → JSON
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "=== Compiling spec files (skipping TEMPLATE.md) ==="
          for f in specs/*.md; do
            base=$(basename "$f")
            # Skip template and any doc files
            case "$base" in TEMPLATE.md|README.md|EXAMPLE.md|_*) echo "  ⏭  Skipping $base"; continue ;; esac
            echo -n "  Compiling $base... "
            python ai_engine/spec_compiler.py "$f" && echo "✅" || echo "⚠️ failed"
          done
          echo ""
          echo "=== Compiled specs ==="
          ls -la specs/*.spec.json 2>/dev/null || echo "No compiled specs"

      # ── 12. Run the AI agent ──────────────────────────────────────────────
      - name: Run AI Test Agent
        timeout-minutes: 55   # hard limit on agent execution
        env:
          BASE_URL:              ${{ env.BASE_URL }}
          AI_MODEL:              ${{ env.AI_MODEL }}
          AI_TIMEOUT:            ${{ env.AI_TIMEOUT }}
          MAX_FIX_RETRIES:       ${{ env.MAX_FIX_RETRIES }}
          TEST_PASSWORD:         ${{ secrets.TEST_PASSWORD }}
          BROWSER_USE_ENABLED:   ${{ env.BROWSER_USE_ENABLED }}
          BROWSER_USE_MODEL:     ${{ env.BROWSER_USE_MODEL }}
          BROWSER_USE_TIMEOUT:   ${{ env.BROWSER_USE_TIMEOUT }}
          OPENAI_API_KEY:        ${{ env.OPENAI_API_KEY }}
          OPENAI_BASE_URL:       ${{ env.OPENAI_BASE_URL }}
          PYTHONPATH:            ${{ github.workspace }}
          PYTHONUNBUFFERED:      "1"
        run: |
          echo "=== Autonomous AI Test Agent v5 ==="
          echo "  Target:       $BASE_URL"
          echo "  AI Model:     $AI_MODEL"
          echo "  AI Timeout:   ${AI_TIMEOUT}s per call"
          echo "  Test Types:   22 (smoke → security)"
          echo "  Model Chain:  14 models (all free, auto-fallback)"
          echo "  Browser-use:  true (langchain-openai → Ollama /v1)"
          echo "  Template:     always-works fallback with compiled selectors"
          echo ""
          python -u ai_engine/agent.py
        continue-on-error: true  # Always upload reports even on test failures

      # ── 13. Generate CI summary ────────────────────────────────────────────
      - name: Generate detailed CI summary
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "=== Generating CI summary ==="
          python scripts/generate_ci_summary.py || echo "⚠️ CI summary generation failed"
          ls -la reports/ 2>/dev/null || echo "No reports directory"

      # ── 13b. Generate HTML bug report (always — even on timeout/cancel) ────
      - name: Generate HTML bug report
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "=== Generating HTML bug report from partial/complete data ==="
          python scripts/generate_html_report.py || echo "⚠️ HTML report generation failed"
          ls -la reports/bug-report.html 2>/dev/null && echo "✅ bug-report.html ready" || echo "❌ bug-report.html missing"

      # ── 14. Upload HTML bug report ────────────────────────────────────────
      - name: Upload HTML bug report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: bug-report-${{ github.run_number }}
          path: reports/bug-report.html
          retention-days: 30
          if-no-files-found: warn

      # ── 15. Upload screenshots ────────────────────────────────────────────
      # Only created on test failures, so when the AI agent has 0 failures
      # there is nothing to upload — `ignore` keeps the log clean.
      - name: Upload screenshots
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: reports/screenshots/
          if-no-files-found: ignore
          retention-days: 30

      # ── 16a. Belt-and-braces: nuke any raw playwright temp videos that
      # snuck past conftest's session_finish cleanup. The artifact uploader
      # otherwise hits ENOENT mid-zip when these files vanish between
      # the file-list scan and the byte-read (TOCTOU race seen in run #43).
      - name: Clean Playwright raw videos before artifact upload
        if: always()
        run: |
          find reports/videos -name 'page@*.webm' -delete 2>/dev/null || true
          find reports -name 'page@*.webm' -delete 2>/dev/null || true
          echo "Remaining videos:"
          ls -la reports/videos/ 2>/dev/null | head -10 || true

      # ── 16. Upload full reports + evidence ────────────────────────────────
      - name: Upload full reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: full-reports-${{ github.run_number }}
          path: |
            reports/
            !reports/videos/page@*.webm
          retention-days: 30

      # NOTE: GitHub Pages deploy moved to the consolidate-reports job (end of
      # workflow) so the FULL master report from all 9 agents is what goes
      # live, instead of just this job's partial AI-only report.

      # ── 17. Upload generated tests ────────────────────────────────────────
      - name: Upload generated tests
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: ai-generated-tests-${{ github.run_number }}
          path: tests/
          if-no-files-found: warn
          retention-days: 30

      # ── 18. Upload compiled specs ─────────────────────────────────────────
      - name: Upload compiled specs
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: compiled-specs-${{ github.run_number }}
          path: specs/*.spec.json
          if-no-files-found: warn
          retention-days: 30

      # ── 19. Write GitHub Step Summary ────────────────────────────────────
      # Shows: model used, test data per type, pass/fail per test, bug tickets, gaps.
      - name: Write job summary
        if: always()
        run: |
          # ── Header (always written) ─────────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" << 'HEADER'
          ## 🤖 Mehad Autonomous AI Test Agent — v5
          HEADER
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "| Field | Value |"                                                                    >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|"                                                                    >> "$GITHUB_STEP_SUMMARY"
          echo "| 🤖 AI Model | \`${{ env.AI_MODEL }}\` (Ollama — free/local, no API key) |"        >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔗 Target | \`${{ env.BASE_URL }}\` |"                                             >> "$GITHUB_STEP_SUMMARY"
          echo "| 🚀 Trigger | ${{ github.event_name }} |"                                            >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔢 Run | #${{ github.run_number }} |"                                              >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Architecture | v5 — 22 Types · 14-Model Chain · Template Fallback |"            >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌐 Browser-use | true (langchain-openai → Ollama /v1, no API key) |"             >> "$GITHUB_STEP_SUMMARY"
          echo "| 📦 Ref | \`${{ github.ref_name }}\` @ \`${{ github.sha }}\` |"                    >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # ── Quick results from summary.json ────────────────────────────
          # Show AI agent results + note that full count is in master report
          echo "### 📊 AI Agent Results (this job only)" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Full consolidated total across ALL 22+ parallel agents is in the** \`master-bug-report\` artifact." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/summary.json ]; then
            python3 -c "
          import json
          d = json.load(open('reports/summary.json'))
          p = d.get('total_passed', 0)
          f = d.get('total_failed', 0)
          t = d.get('total_tests', 0)
          b = d.get('total_bugs', 0)
          rate = f'{p/t*100:.0f}%' if t else 'N/A'
          partial = ' *(partial)*' if d.get('partial') else ''
          print(f'| ✅ AI Agent Passed | {p}{partial} |')
          print(f'| ❌ AI Agent Failed | {f} |')
          print(f'| 📊 AI Agent Tests  | {t} (this job only — full suite is 3000+) |')
          print(f'| 📈 Pass Rate       | {rate} |')
          print(f'| 🐛 Bug Tickets     | {b} |')
          specs = d.get('specs_tested', [])
          print(f'| 📄 Specs Tested    | {len(specs)} |')
          print(f'| 🕐 Timestamp       | {d.get(\"timestamp\", \"N/A\")} |')
          " >> "$GITHUB_STEP_SUMMARY" || echo "| Note | AI agent summary not yet written |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| ℹ️ AI Agent | summary.json not yet written (may still be running) |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔢 Full Test Suite | **3000+ tests** across 22 parallel agents — see Consolidate job |" >> "$GITHUB_STEP_SUMMARY"

          # ── Detailed per-type breakdown from ci_summary.md ─────────────
          if [ -f reports/ci_summary.md ]; then
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            cat reports/ci_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

          # ── Raw test data log (collapsible) ────────────────────────────
          if [ -f reports/test_data_log.json ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details>" >> "$GITHUB_STEP_SUMMARY"
            echo "<summary>📋 Test Data Log (what data AI used per test type)</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json
          d = json.load(open('reports/test_data_log.json'))
          out = {'model_used': d.get('model_used'), 'timestamp': d.get('timestamp'), 'specs': {}}
          for spec, sdata in d.get('specs', {}).items():
              out['specs'][spec] = {'total_tests': sdata.get('total_tests'), 'types': {}}
              for t, tdata in sdata.get('types', {}).items():
                  out['specs'][spec]['types'][t] = {
                      'test_count': tdata.get('test_count', 0),
                      'test_data_sample': tdata.get('test_data', [])[:3],
                      'tests': tdata.get('tests', [])[:5],
                  }
          print(json.dumps(out, indent=2))
          " >> "$GITHUB_STEP_SUMMARY" || cat reports/test_data_log.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "📥 **Artifacts:** \`bug-report-${{ github.run_number }}\` · \`ai-generated-tests-${{ github.run_number }}\` · \`full-reports-${{ github.run_number }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  # QA AGENT 1 — Functional + Edge Cases (QA-01, QA-02)
  # Runs the hand-crafted Playwright tests — no Ollama / AI required.
  # ─────────────────────────────────────────────────────────────────────────────
  qa-agent-1-functional:
    name: "QA Agent 1 — Functional & Edge Cases"
    runs-on: ubuntu-latest
    # Bumped 30→45 after run #50 hit the limit on slow-staging runs.
    # QA-01 + QA-02 typically finish in ~6-10 min; the buffer absorbs
    # OTP rate-limit retries that occasionally drag tests out.
    timeout-minutes: 45

    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://dev.mehadedu.com/en' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install playwright pytest pytest-playwright pytest-html pytest-timeout pytest-json-report Pillow

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Prepare reports directory
        run: mkdir -p reports reports/screenshots reports/evidence

      - name: Verify syntax of test file
        run: python3 -m py_compile tests/test_qa_comprehensive.py && echo "✅ Syntax OK"

      - name: Run QA-01 Functional Tests
        continue-on-error: true
        run: |
          BASE_URL=${{ env.BASE_URL }} python3 -m pytest \
            tests/test_qa_comprehensive.py::TestQA01Functional \
            --timeout=60 --timeout-method=thread \
            --tb=short -v -p no:warnings \
            --html=reports/qa01-functional.html --self-contained-html \
            --json-report --json-report-file=reports/qa01_functional_results.json \
            -p no:cacheprovider 2>&1 | tee reports/qa01-functional.txt

      - name: Run QA-02 Edge Case Tests
        continue-on-error: true
        run: |
          BASE_URL=${{ env.BASE_URL }} python3 -m pytest \
            tests/test_qa_comprehensive.py::TestQA02EdgeCaseBoundary \
            --timeout=60 --timeout-method=thread \
            --tb=short -v -p no:warnings \
            --html=reports/qa02-edge.html --self-contained-html \
            --json-report --json-report-file=reports/qa02_edge_results.json \
            -p no:cacheprovider 2>&1 | tee reports/qa02-edge.txt

      - name: Write QA Agent 1 Summary
        if: always()
        run: |
          echo "## QA Agent 1 — Functional & Edge Cases" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Group | Report |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| QA-01 Functional | qa01-functional.html |" >> "$GITHUB_STEP_SUMMARY"
          echo "| QA-02 Edge Cases | qa02-edge.html |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for f in reports/qa01-functional.txt reports/qa02-edge.txt; do
