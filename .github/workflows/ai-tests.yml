      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install dependencies
        run: pip install playwright pytest pytest-playwright pytest-html pytest-timeout pytest-json-report Pillow
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Prepare reports directory
        run: mkdir -p reports reports/screenshots reports/evidence
      - name: Syntax check
        run: |
          python3 -m py_compile tests/test_data_flow_e2e.py && echo "✅ test_data_flow_e2e.py"
          python3 -m py_compile tests/test_realtime_data_flow.py && echo "✅ test_realtime_data_flow.py"
          python3 -m py_compile tests/test_e2e_create_book_verify.py && echo "✅ test_e2e_create_book_verify.py"
      - name: "Run Full E2E Create+Book+Verify (Phase 1-3 all-in-one)"
        run: |
          set -o pipefail
          echo "=== Full E2E: Tutor creates slot+course → Student books → Verify 8 data flow points ==="
          BASE_URL=${{ env.BASE_URL }} \
          STUDENT_PHONE=${{ env.STUDENT_PHONE }} \
          STUDENT_OTP=${{ env.STUDENT_OTP }} \
          TEACHER_PHONE=${{ env.TEACHER_PHONE }} \
          TEACHER_OTP=${{ env.TEACHER_OTP }} \
          TEST_COUNTRY=${{ env.TEST_COUNTRY }} \
          SUPER_ADMIN_EMAIL=${{ env.SUPER_ADMIN_EMAIL }} \
          SUPER_ADMIN_PHONE=${{ env.SUPER_ADMIN_PHONE }} \
          SUPER_ADMIN_PASS=${{ env.SUPER_ADMIN_PASS }} \
          SUPER_ADMIN_OTP=${{ env.SUPER_ADMIN_OTP }} \
          SUPER_ADMIN_LOGIN_URL=${{ env.SUPER_ADMIN_LOGIN_URL }} \
          SUPER_ADMIN_COUNTRY=${{ env.SUPER_ADMIN_COUNTRY }} \
          SUPER_ADMIN_COUNTRY_CODE=${{ env.SUPER_ADMIN_COUNTRY_CODE }} \
          python3 -m pytest tests/test_e2e_create_book_verify.py \
            --timeout=180 --timeout-method=thread \
            --tb=short -v -p no:warnings \
            --html=reports/e2e-create-book-verify.html --self-contained-html \
            --json-report --json-report-file=reports/e2e_cbv_results.json \
            -p no:cacheprovider 2>&1 | tee reports/e2e-create-book-verify.txt
          cp reports/e2e_data_flow_report.json reports/e2e_data_flow_report.full.json
          echo ""
          echo "=== E2E create+book+verify result ==="
          if [ -f reports/e2e_data_flow_report.json ]; then
            python3 -c "
          import json
          d = json.load(open('reports/e2e_data_flow_report.json'))
          b = d.get('booking', {})
          cd = d.get('created_data', {})
          steps = d.get('steps', [])
          passed = sum(1 for s in steps if s.get('status') == 'PASS')
          failed = sum(1 for s in steps if s.get('status') == 'FAIL')
          print(f'Booking ID  : {b.get(\"booking_id\",\"—\")}')
          print(f'Tutor       : {b.get(\"tutor_name\",\"—\")}')
          slot = cd.get('slot', {})
          course = cd.get('course', {})
          print(f'Slot created: {slot.get(\"date\",\"—\")} {slot.get(\"start_time\",\"—\")}–{slot.get(\"end_time\",\"—\")} | ok={slot.get(\"created\",False)}')
          print(f'Course      : {course.get(\"name\",\"—\")} | {course.get(\"price_sar\",\"—\")} SAR | ok={course.get(\"created\",False)}')
          print(f'Steps       : {passed} PASS / {failed} FAIL / {len(steps)} total')
          " || true
          fi

      - name: Setup Test Data (create slots + group session + booking)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          echo "=== Running setup_test_data.py ==="
          echo "  Target: ${{ env.BASE_URL }}"
          echo "  Tutor : ${{ env.TEACHER_PHONE }} (OTP ${{ env.TEACHER_OTP }})"
          echo "  Student: ${{ env.STUDENT_PHONE }} (OTP ${{ env.STUDENT_OTP }})"
          echo ""
          BASE_URL=${{ env.BASE_URL }} \
          STUDENT_PHONE=${{ env.STUDENT_PHONE }} \
          STUDENT_OTP=${{ env.STUDENT_OTP }} \
          TEACHER_PHONE=${{ env.TEACHER_PHONE }} \
          TEACHER_OTP=${{ env.TEACHER_OTP }} \
          TEST_COUNTRY=${{ env.TEST_COUNTRY }} \
          python3 tests/setup_test_data.py 2>&1 | tee reports/setup-test-data.txt
          echo ""
          echo "=== Setup result ==="
          if [ -f reports/setup_data_summary.json ]; then
            python3 -c "
          import json
          d = json.load(open('reports/setup_data_summary.json'))
          slots = d.get('availability_slots', [])
          gs    = d.get('group_session', {})
          sb    = d.get('student_booking', {})
          errs  = d.get('errors', [])
          print(f'Slots created    : {len(slots)} — {[s[\"label\"] for s in slots]}')
          print(f'Group session    : {gs.get(\"name\",\"—\")} | Subject: {gs.get(\"subject\",\"—\")} | {gs.get(\"display_date\",\"—\")} {gs.get(\"start_time\",\"—\")}–{gs.get(\"end_time\",\"—\")} | Price: {gs.get(\"price_sar\",\"—\")} SAR')
          print(f'Student booking  : {sb.get(\"booking_id\",\"—\")} | Tutor: {sb.get(\"tutor_name\",\"—\")} | {sb.get(\"date\",\"—\")} {sb.get(\"time_slot\",\"—\")} | Subject: {sb.get(\"subject\",\"—\")}')
          print(f'Errors           : {len(errs)} — {errs[:2] if errs else \"none\"}')
          " || true
          else
            echo "⚠ setup_data_summary.json not created — server may be unreachable"
          fi
      - name: Run Data Flow E2E Tests
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          BASE_URL=${{ env.BASE_URL }} \
          STUDENT_PHONE=${{ env.STUDENT_PHONE }} \
          STUDENT_OTP=${{ env.STUDENT_OTP }} \
          TEACHER_PHONE=${{ env.TEACHER_PHONE }} \
          TEACHER_OTP=${{ env.TEACHER_OTP }} \
          TEST_COUNTRY=${{ env.TEST_COUNTRY }} \
          python3 -m pytest tests/test_data_flow_e2e.py \
            --timeout=90 --timeout-method=thread \
            --tb=short -v -p no:warnings \
            --html=reports/data-flow-e2e.html --self-contained-html \
            --json-report --json-report-file=reports/data_flow_e2e_results.json \
            -p no:cacheprovider 2>&1 | tee reports/data-flow-e2e.txt
      - name: Run Real-Time Data Flow Tests
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          BASE_URL=${{ env.BASE_URL }} \
          STUDENT_PHONE=${{ env.STUDENT_PHONE }} \
          STUDENT_OTP=${{ env.STUDENT_OTP }} \
          TEACHER_PHONE=${{ env.TEACHER_PHONE }} \
          TEACHER_OTP=${{ env.TEACHER_OTP }} \
          TEST_COUNTRY=${{ env.TEST_COUNTRY }} \
          python3 -m pytest tests/test_realtime_data_flow.py \
            --timeout=180 --timeout-method=thread \
            --tb=short -v -p no:warnings \
            --html=reports/realtime-data-flow.html --self-contained-html \
            --json-report --json-report-file=reports/realtime_flow_results.json \
            -p no:cacheprovider 2>&1 | tee reports/realtime-data-flow.txt
      - name: Enforce real data-flow artifacts
        if: always()
        run: |
          python3 - <<'PY'
          import json, re
          from pathlib import Path

          p = Path("reports/e2e_data_flow_report.full.json")
          if not p.exists():
              p = Path("reports/e2e_data_flow_report.json")
          if not p.exists():
              raise SystemExit("reports/e2e_data_flow_report.full.json missing")

          d = json.loads(p.read_text())
          booking = d.get("booking", {})
          created = d.get("created_data", {})
          steps = d.get("steps", [])
          bid = str(booking.get("booking_id") or "")
          slot = created.get("slot") or {}
          course = created.get("course") or {}
          failures = []

          if not re.search(r"\bD?BK-\d{8}-[A-Z0-9]{4,8}\b", bid, re.I):
              failures.append(f"missing real booking_id (got {bid!r})")
          if not slot.get("created") or not slot.get("date") or not slot.get("start_time"):
              failures.append(f"slot not created with real date/time: {slot!r}")
          if not course.get("created") or not course.get("name") or not course.get("price_sar"):
              failures.append(f"course not created with real name/price: {course!r}")

          failed_steps = [
              f"{s.get('step')} {s.get('module')}: {s.get('detail')}"
              for s in steps if s.get("status") == "FAIL"
          ]
          if failed_steps:
              failures.append("failed data-flow checks: " + " | ".join(failed_steps[:8]))

          if failures:
              print("REAL DATA FLOW GATE FAILED")
              for f in failures:
                  print(" -", f)
              raise SystemExit(1)

          print(f"REAL DATA FLOW GATE PASSED: {bid}")
          print(f"slot={slot}")
          print(f"course={course}")
          PY
      - name: Write Data Flow Summary
        if: always()
        run: |
          echo "## QA Agent 19 — Data Flow & Real-Time Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # Setup data summary
          if [ -f reports/setup_data_summary.json ]; then
            echo "### 📋 Setup Data Created" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
