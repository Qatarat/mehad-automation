  # ─────────────────────────────────────────────────────────────────────────────
  # PHASE 4.5 — VISION-LLM UI VALIDATION (QA-22)
  # Off by default in CI (5GB model + warm-up). Set ENABLE_VISION_QA=true
  # in workflow_dispatch to run a real vision review.
  # ─────────────────────────────────────────────────────────────────────────────
  qa-agent-18-vision-ui:
    name: "QA Agent 18 — Vision-LLM UI Review"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      BASE_URL:           ${{ github.event.inputs.base_url || 'https://dev.mehadedu.com/en' }}
      ENABLE_VISION_QA:   ${{ github.event.inputs.enable_vision || 'false' }}
      VISION_MODEL:       "qwen2-vl:7b"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install dependencies
        run: pip install playwright pytest pytest-playwright pytest-html pytest-timeout pytest-json-report Pillow ollama
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Install Ollama (only if vision QA enabled)
        if: env.ENABLE_VISION_QA == 'true'
        run: curl -fsSL https://ollama.ai/install.sh | sh
      - name: Pull vision model (only if enabled)
        if: env.ENABLE_VISION_QA == 'true'
        timeout-minutes: 15
        run: |
          ollama serve &
          for i in $(seq 1 20); do curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && break; sleep 2; done
          timeout 600 ollama pull ${VISION_MODEL} || echo "vision model unavailable"
      - name: Prepare reports directory
        run: mkdir -p reports reports/screenshots reports/evidence reports/vision-shots
      - name: Run QA-22 Vision UI Review
        continue-on-error: true
        run: |
          BASE_URL=${{ env.BASE_URL }} \
            ENABLE_VISION_QA=${{ env.ENABLE_VISION_QA }} \
            VISION_MODEL=${{ env.VISION_MODEL }} \
            python3 -m pytest \
            tests/test_qa_comprehensive.py::TestQA22VisionUIValidation \
            --timeout=180 --timeout-method=thread --tb=short -v -p no:warnings \
            --html=reports/qa22-vision.html --self-contained-html \
            --json-report --json-report-file=reports/qa22_vision_results.json \
            -p no:cacheprovider 2>&1 | tee reports/qa22-vision.txt
      - name: Upload QA Agent 18 Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: qa-agent-18-reports-${{ github.run_number }}
          path: |
            reports/qa22*
            reports/vision-shots/
            reports/screenshots/
            reports/videos/
            !reports/videos/page@*.webm
            reports/evidence/
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # SPEC VALIDATION — Runs all 70 spec-driven tests (test_specs_all.py)
  # Regenerates from scratch so specs added since last commit are always covered.
  # Results written as individual per-spec JSON files for per-group reporting.
  # ─────────────────────────────────────────────────────────────────────────────
  qa-spec-validation:
    name: "QA — Spec Validation (70 specs, 2000+ tests)"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: qa-agent-data-flow
    if: always()

    services:
      waha:
        image: devlikeapro/waha
        ports:
          - 3000:3000

    env:
      BASE_URL:        ${{ github.event.inputs.base_url || 'https://dev.mehadedu.com/en' }}
      TEST_OTP:        ${{ secrets.TEST_OTP        || '123456' }}
      TEST_PHONE:      ${{ secrets.TEST_PHONE      || '98976564' }}
      TEST_COUNTRY:    ${{ secrets.TEST_COUNTRY    || '+880' }}
      TEACHER_PHONE:   ${{ secrets.TEACHER_PHONE   || '98976564' }}
      TEACHER_OTP:     ${{ secrets.TEACHER_OTP     || '123456' }}
      STUDENT_PHONE:   ${{ secrets.STUDENT_PHONE   || '98765432' }}
      STUDENT_OTP:     ${{ secrets.STUDENT_OTP     || '123456' }}
      SUPER_ADMIN_EMAIL:     ${{ secrets.SUPER_ADMIN_EMAIL     || '' }}
      SUPER_ADMIN_PHONE:     ${{ secrets.SUPER_ADMIN_PHONE     || '' }}
      SUPER_ADMIN_PASS:      ${{ secrets.SUPER_ADMIN_PASS      || '' }}
      SUPER_ADMIN_OTP:       ${{ secrets.SUPER_ADMIN_OTP       || '123456' }}
      SUPER_ADMIN_LOGIN_URL: ${{ secrets.SUPER_ADMIN_LOGIN_URL || '' }}
      SUPER_ADMIN_COUNTRY:   ${{ secrets.SUPER_ADMIN_COUNTRY   || 'Bangladesh' }}
      SUPER_ADMIN_COUNTRY_CODE: ${{ secrets.SUPER_ADMIN_COUNTRY_CODE || '+880' }}
      # ── WAHA (WhatsApp HTTP API) — Docker service above exposes :3000 ────────
      WAHA_URL:        http://localhost:3000
      WAHA_SESSION:    ${{ secrets.WAHA_SESSION  || 'default' }}
      WAHA_CHAT_ID:    ${{ secrets.WAHA_CHAT_ID  || '' }}

    steps:
      - uses: actions/checkout@v5

      - name: Wait for WAHA (WhatsApp OTP service)
        run: |
          for i in $(seq 1 15); do
            curl -s http://localhost:3000/api/version > /dev/null 2>&1 && echo "✅ WAHA ready" && break
            sleep 2
          done
          echo "WAHA: $(curl -s http://localhost:3000/api/sessions 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d[0].get(\"status\",\"?\") if d else \"no sessions\")' 2>/dev/null || echo 'not reachable')"
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }

      - name: Install Python dependencies
        run: |
          pip install playwright pytest pytest-playwright pytest-html \
                      pytest-timeout pytest-json-report Pillow

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Prepare reports directory
        run: mkdir -p reports reports/screenshots reports/evidence

      - name: Regenerate test_specs_all.py from all 70 specs
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "=== Regenerating tests from 70 spec files ==="
          python3 scripts/validate_all_specs.py
          echo "Test functions: $(grep -c '^    def test_' tests/test_specs_all.py || echo '?')"

      - name: Verify generated test file syntax
        run: python3 -m py_compile tests/test_specs_all.py && echo "✅ Syntax OK"

      - name: Run QA-23 Route Inventory Tests
        continue-on-error: true
        env:
          BASE_URL:       ${{ env.BASE_URL }}
          TEACHER_PHONE:  ${{ env.TEACHER_PHONE }}
          TEACHER_OTP:    ${{ env.TEACHER_OTP }}
          TEST_COUNTRY:   ${{ env.TEST_COUNTRY }}
          PYTHONPATH:     ${{ github.workspace }}
        run: |
          python3 -m pytest tests/test_route_inventory.py \
            --timeout=45 --timeout-method=thread \
            --tb=short -v -p no:warnings \
            --html=reports/route-inventory.html --self-contained-html \
            --json-report --json-report-file=reports/qa23_route_inventory_results.json \
            -p no:cacheprovider 2>&1 | tee reports/route-inventory.txt || true

      - name: Run spec smoke/navigation tests (push + PR)
        if: github.event_name != 'schedule'
        continue-on-error: true
        env:
          BASE_URL:     ${{ env.BASE_URL }}
          PYTHONPATH:   ${{ github.workspace }}
          SUPER_ADMIN_EMAIL:     ${{ env.SUPER_ADMIN_EMAIL }}
          SUPER_ADMIN_PHONE:     ${{ env.SUPER_ADMIN_PHONE }}
          SUPER_ADMIN_PASS:      ${{ env.SUPER_ADMIN_PASS }}
          SUPER_ADMIN_OTP:       ${{ env.SUPER_ADMIN_OTP }}
          SUPER_ADMIN_LOGIN_URL: ${{ env.SUPER_ADMIN_LOGIN_URL }}
          SUPER_ADMIN_COUNTRY:   ${{ env.SUPER_ADMIN_COUNTRY }}
          SUPER_ADMIN_COUNTRY_CODE: ${{ env.SUPER_ADMIN_COUNTRY_CODE }}
        run: |
          python3 -m pytest tests/test_specs_all.py \
            -m "smoke or navigation" \
            --timeout=30 --timeout-method=thread \
            --tb=line -q -p no:warnings \
            --html=reports/spec-validation-smoke.html --self-contained-html \
            --json-report --json-report-file=reports/qa21_spec_validation_smoke_results.json \
            -p no:cacheprovider 2>&1 | tee reports/spec-validation-smoke.txt || true

      - name: Run all spec tests — Part A (scheduled full suite only)
        if: github.event_name == 'schedule'
        continue-on-error: true
        env:
          BASE_URL:     ${{ env.BASE_URL }}
          PYTHONPATH:   ${{ github.workspace }}
          SUPER_ADMIN_EMAIL:     ${{ env.SUPER_ADMIN_EMAIL }}
          SUPER_ADMIN_PHONE:     ${{ env.SUPER_ADMIN_PHONE }}
          SUPER_ADMIN_PASS:      ${{ env.SUPER_ADMIN_PASS }}
          SUPER_ADMIN_OTP:       ${{ env.SUPER_ADMIN_OTP }}
          SUPER_ADMIN_LOGIN_URL: ${{ env.SUPER_ADMIN_LOGIN_URL }}
          SUPER_ADMIN_COUNTRY:   ${{ env.SUPER_ADMIN_COUNTRY }}
          SUPER_ADMIN_COUNTRY_CODE: ${{ env.SUPER_ADMIN_COUNTRY_CODE }}
        run: |
          CLASSES=$(python3 -c "
          import re
          src = open('tests/test_specs_all.py').read()
          classes = re.findall(r'^class (TestSpec_\w+)', src, re.MULTILINE)
          half = classes[:35]
          print(' '.join(f'tests/test_specs_all.py::{c}' for c in half))
          ")
          python3 -m pytest $CLASSES \
            --timeout=30 --timeout-method=thread \
            --tb=line -q -p no:warnings \
            --html=reports/spec-validation-a.html --self-contained-html \
            --json-report --json-report-file=reports/qa21_spec_validation_a_results.json \
            -p no:cacheprovider 2>&1 | tee reports/spec-validation-a.txt || true

      - name: Run all spec tests — Part B (scheduled full suite only)
        if: github.event_name == 'schedule'
        continue-on-error: true
        env:
          BASE_URL:     ${{ env.BASE_URL }}
          PYTHONPATH:   ${{ github.workspace }}
          SUPER_ADMIN_EMAIL:     ${{ env.SUPER_ADMIN_EMAIL }}
          SUPER_ADMIN_PHONE:     ${{ env.SUPER_ADMIN_PHONE }}
          SUPER_ADMIN_PASS:      ${{ env.SUPER_ADMIN_PASS }}
          SUPER_ADMIN_OTP:       ${{ env.SUPER_ADMIN_OTP }}
          SUPER_ADMIN_LOGIN_URL: ${{ env.SUPER_ADMIN_LOGIN_URL }}
          SUPER_ADMIN_COUNTRY:   ${{ env.SUPER_ADMIN_COUNTRY }}
          SUPER_ADMIN_COUNTRY_CODE: ${{ env.SUPER_ADMIN_COUNTRY_CODE }}
        run: |
          CLASSES=$(python3 -c "
          import re
          src = open('tests/test_specs_all.py').read()
          classes = re.findall(r'^class (TestSpec_\w+)', src, re.MULTILINE)
          half = classes[35:]
          print(' '.join(f'tests/test_specs_all.py::{c}' for c in half))
          ")
          python3 -m pytest $CLASSES \
            --timeout=30 --timeout-method=thread \
            --tb=line -q -p no:warnings \
            --html=reports/spec-validation-b.html --self-contained-html \
            --json-report --json-report-file=reports/qa21_spec_validation_b_results.json \
            -p no:cacheprovider 2>&1 | tee reports/spec-validation-b.txt || true

      - name: Upload Spec Validation Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: qa-spec-validation-${{ github.run_number }}
          path: |
            reports/qa21_spec_validation*.json
            reports/qa23_route_inventory_results.json
            reports/spec-validation*.html
            reports/route-inventory.html
            reports/route-inventory.txt
            reports/spec-validation*.txt
            reports/screenshots/
          retention-days: 30
          if-no-files-found: warn

  qa-agent-data-flow:
    name: "QA Agent 19 — Data Flow & Real-Time Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: always()

    env:
      BASE_URL:       ${{ github.event.inputs.base_url || 'https://dev.mehadedu.com/en' }}
      STUDENT_PHONE:  ${{ secrets.STUDENT_PHONE || '98765432' }}
      STUDENT_OTP:    ${{ secrets.STUDENT_OTP   || '123456' }}
      TEACHER_PHONE:  ${{ secrets.TEACHER_PHONE || secrets.TEST_PHONE || '98976564' }}
      TEACHER_OTP:    ${{ secrets.TEACHER_OTP   || secrets.TEST_OTP   || '123456' }}
      TEST_COUNTRY:   ${{ secrets.TEST_COUNTRY  || '+880' }}
      SUPER_ADMIN_EMAIL:     ${{ secrets.SUPER_ADMIN_EMAIL     || '' }}
      SUPER_ADMIN_PHONE:     ${{ secrets.SUPER_ADMIN_PHONE     || '' }}
      SUPER_ADMIN_PASS:      ${{ secrets.SUPER_ADMIN_PASS      || '' }}
