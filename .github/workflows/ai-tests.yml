              print(f'| Group Session Name | {gs.get(\"name\",\"—\")} |')
              print(f'| Group Session Subject | {gs.get(\"subject\",\"—\")} |')
              print(f'| Group Session Date | {gs.get(\"display_date\",\"—\")} {gs.get(\"start_time\",\"—\")}–{gs.get(\"end_time\",\"—\")} |')
              print(f'| Group Session Price | {gs.get(\"price_sar\",\"—\")} SAR / student |')
          else:
              print(f'| Group Session | Not created ({len(errs)} errors) |')
          bid = sb.get(\"booking_id\",\"\")
          print(f'| Student Booking ID | {bid or \"not captured\"} |')
          print(f'| Booked Tutor | {sb.get(\"tutor_name\",\"—\")} |')
          print(f'| Booked Date | {sb.get(\"date\",\"—\")} |')
          print(f'| Booked Time Slot | {sb.get(\"time_slot\",\"—\")} |')
          print(f'| Subject | {sb.get(\"subject\",\"—\")} |')
          " >> "$GITHUB_STEP_SUMMARY" || true
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> ⚠️ Setup data not available — server may be unreachable (dev.mehadedu.com)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| Suite | Report |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Data Flow E2E | data-flow-e2e.html |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Real-Time Booking Flow | realtime-data-flow.html |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for f in reports/data-flow-e2e.txt reports/realtime-data-flow.txt; do
            [ -f "$f" ] && tail -3 "$f" >> "$GITHUB_STEP_SUMMARY" || true
          done
      - name: Upload Data Flow Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: qa-agent-data-flow-reports-${{ github.run_number }}
          path: |
            reports/data-flow*
            reports/realtime*
            reports/data_flow*
            reports/realtime_flow*
            reports/e2e-create-book-verify*
            reports/e2e_cbv*
            reports/e2e_data_flow_report.json
            reports/e2e_data_flow_report.full.json
            reports/setup_data_summary.json
            reports/setup_data_summary.e2e.json
            reports/setup_data_summary.setup*.json
            reports/setup_booking_id.txt
            reports/screenshots/
            reports/evidence/
          retention-days: 30
          if-no-files-found: warn

