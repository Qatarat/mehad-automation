  # ─────────────────────────────────────────────────────────────────────────────
  # QA AGENT 5 — LangGraph agent (generates + runs AI tests via graph)
  # ─────────────────────────────────────────────────────────────────────────────
  qa-agent-5-langgraph:
    name: "QA Agent 5 — LangGraph AI Orchestration"
    runs-on: ubuntu-latest
    timeout-minutes: 90    # raised from 60 — 7b pull (~10m) + 28 specs parallel need headroom
    env:
      BASE_URL:            ${{ github.event.inputs.base_url || 'https://dev.mehadedu.com/en' }}
      AI_MODEL:            ${{ github.event.inputs.ai_model || 'qwen2.5-coder:7b' }}
      AI_TIMEOUT:          "90"
      MAX_FIX_RETRIES:     "1"
      OPENAI_API_KEY:      "ollama"
      OPENAI_BASE_URL:     "http://localhost:11434/v1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt || true
          pip install langgraph langchain-core langchain-ollama playwright \
                      pytest pytest-playwright pytest-json-report pytest-html pytest-timeout Jinja2
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-v6-qwen2.5-coder-7b-1.5b-tinyllama
      - name: Start Ollama + pull models
        timeout-minutes: 20   # guard: model pull should never consume the whole job budget
        run: |
          ollama serve &
          for i in $(seq 1 20); do curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && break; sleep 2; done
          timeout 600 ollama pull qwen2.5-coder:7b  || echo "7b unavailable"
          timeout 180 ollama pull qwen2.5-coder:1.5b || echo "1.5b unavailable"
          timeout 120 ollama pull tinyllama:1.1b     || echo "tinyllama unavailable"
          ollama list
      - name: Prepare directories
        run: mkdir -p tests reports reports/screenshots reports/evidence cache/tests
      - name: Run LangGraph Agent
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "=== LangGraph Agent — spec → generate → cache → run ==="
          python -u -m ai_engine.langgraph_agent || true
      - name: Ensure upload dirs exist (avoids ENOENT on early cancel)
        if: always()
        run: |
          mkdir -p reports cache/tests
          touch reports/.keep cache/tests/.keep
      - name: Upload LangGraph Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: qa-agent-5-langgraph-${{ github.run_number }}
          path: |
            reports/
            cache/tests/
          retention-days: 30
          if-no-files-found: warn

